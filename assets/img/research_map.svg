<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1040" width="920" height="1040" role="img" aria-label="Research map of Soumyadeep Roy: efficient medical foundation models, reliability evaluation on real-world data, and guideline-grounded clinical reasoning converging on deployable clinical AI.">
  <defs>
    <style>
      :root{}
      .ink{fill:#14253B;}
      .slate{fill:#5C6B7A;}
      .eyebrow{font-family:'Helvetica Neue',Inter,system-ui,Arial,sans-serif;font-weight:600;letter-spacing:.14em;text-transform:uppercase;}
      .h{font-family:'Helvetica Neue',Inter,system-ui,Arial,sans-serif;font-weight:700;}
      .b{font-family:'Helvetica Neue',Inter,system-ui,Arial,sans-serif;font-weight:500;}
      .cap{font-family:'Helvetica Neue',Inter,system-ui,Arial,sans-serif;font-weight:500;letter-spacing:.01em;}
      text{ -webkit-font-smoothing:antialiased; }
    </style>
  </defs>

  <!-- panel -->
  <rect x="4" y="4" width="912" height="1032" rx="22" fill="#F5F8F9" stroke="#DCE5E9" stroke-width="1.5"/>

  <!-- ===================== HEADER ===================== -->
  <text x="56" y="58" class="eyebrow" font-size="12.5" fill="#0E7C86">Soumyadeep Roy</text>
  <text x="864" y="58" class="eyebrow" font-size="12.5" fill="#5C6B7A" text-anchor="end">Postdoc · Stanford Medicine · Computational Medicine</text>

  <text x="56" y="98" class="h ink" font-size="27">Deployable medical language models,</text>
  <text x="56" y="132" class="h" font-size="27"><tspan fill="#14253B">grounded in </tspan><tspan fill="#B16E12">real-world clinical data</tspan></text>

  <text x="56" y="160" class="b slate" font-size="12.5">16+ peer-reviewed papers · SIGIR · ACL · EMNLP · IJCAI · ECAI · CIKM · Frontiers in AI</text>

  <line x1="56" y1="178" x2="864" y2="178" stroke="#DCE5E9" stroke-width="1.5"/>

  <!-- ===================== VENN SECTION ===================== -->
  <text x="56" y="204" class="eyebrow slate" font-size="11.5">Research focus — three converging threads</text>

  <!-- leader lines (behind circles) -->
  <g stroke-width="1.2" fill="none" opacity="0.55">
    <path d="M250 614 L300 552" stroke="#DA8A1F"/>
    <path d="M696 614 L620 552" stroke="#4A53B8"/>
  </g>
  <circle cx="300" cy="552" r="2.6" fill="#DA8A1F"/>
  <circle cx="620" cy="552" r="2.6" fill="#4A53B8"/>

  <!-- circles -->
  <g stroke-width="1.6">
    <circle cx="460" cy="350" r="150" fill="#0E7C86" fill-opacity="0.24" stroke="#0E7C86" stroke-opacity="0.85"/>
    <circle cx="378" cy="488" r="150" fill="#DA8A1F" fill-opacity="0.24" stroke="#C8791A" stroke-opacity="0.85"/>
    <circle cx="542" cy="488" r="150" fill="#4A53B8" fill-opacity="0.22" stroke="#4A53B8" stroke-opacity="0.85"/>
  </g>

  <!-- top lobe: efficient foundation models -->
  <text x="460" y="248" class="eyebrow" font-size="11" fill="#0A5B63" text-anchor="middle">Pretrain + adapt</text>
  <text x="460" y="274" class="h ink" font-size="18.5" text-anchor="middle">Efficient foundation</text>
  <text x="460" y="295" class="h ink" font-size="18.5" text-anchor="middle">models</text>
  <text x="460" y="315" class="cap slate" font-size="11" text-anchor="middle">GeneMask · adaptive BPE · vocabulary adaptation</text>

  <!-- bottom-left lobe: reliability evaluation -->
  <text x="64" y="600" class="eyebrow" font-size="11" fill="#B16E12">Evaluate on real data</text>
  <text x="64" y="624" class="h ink" font-size="18.5">Reliability</text>
  <text x="64" y="645" class="h ink" font-size="18.5">evaluation</text>
  <text x="64" y="664" class="cap slate" font-size="11">USMLE error taxonomy · OOV impact · bias audits</text>

  <!-- bottom-right lobe: guideline-grounded reasoning -->
  <text x="856" y="600" class="eyebrow" font-size="11" fill="#3A42A0" text-anchor="end">Reason + decide</text>
  <text x="856" y="624" class="h ink" font-size="18.5" text-anchor="end">Guideline-grounded</text>
  <text x="856" y="645" class="h ink" font-size="18.5" text-anchor="end">reasoning</text>
  <text x="856" y="664" class="cap slate" font-size="11" text-anchor="end">auditable LLMs · executable pathways</text>

  <!-- core -->
  <circle cx="460" cy="442" r="60" fill="#14253B" stroke="#8C1515" stroke-width="2.2"/>
  <text x="460" y="431" class="eyebrow" font-size="8.5" fill="#C99" text-anchor="middle" opacity="0.9">the goal</text>
  <text x="460" y="450" class="h" font-size="14.5" fill="#FFFFFF" text-anchor="middle">Deployable</text>
  <text x="460" y="468" class="h" font-size="14.5" fill="#FFFFFF" text-anchor="middle">clinical AI</text>

  <!-- ===================== REAL-WORLD DATA BAND ===================== -->
  <rect x="56" y="702" width="808" height="98" rx="16" fill="#FBEEDA" stroke="#EBC58A" stroke-width="1.5"/>
  <rect x="56" y="702" width="6" height="98" rx="3" fill="#DA8A1F"/>
  <text x="84" y="734" class="eyebrow" font-size="12" fill="#B16E12">Grounded in real-world clinical data</text>
  <text x="84" y="758" class="b ink" font-size="13.5">Evaluation and decision support built on data from actual patient care.</text>

  <!-- chips -->
  <g>
    <rect x="84" y="772" width="86" height="26" rx="13" fill="#FFFFFF" stroke="#E3C189" stroke-width="1"/>
    <text x="127" y="789" class="b ink" font-size="11.5" text-anchor="middle">MIMIC-IV</text>

    <rect x="182" y="772" width="150" height="26" rx="13" fill="#FFFFFF" stroke="#E3C189" stroke-width="1"/>
    <text x="257" y="789" class="b ink" font-size="11.5" text-anchor="middle">structured EHR + notes</text>

    <rect x="344" y="772" width="160" height="26" rx="13" fill="#FFFFFF" stroke="#E3C189" stroke-width="1"/>
    <text x="424" y="789" class="b ink" font-size="11.5" text-anchor="middle">bias &amp; fairness audits</text>

    <rect x="516" y="772" width="172" height="26" rx="13" fill="#FFFFFF" stroke="#E3C189" stroke-width="1"/>
    <text x="602" y="789" class="b ink" font-size="11.5" text-anchor="middle">perioperative pain care</text>
  </g>

  <!-- ===================== EXPERIENCE RAIL ===================== -->
  <text x="56" y="848" class="eyebrow slate" font-size="11.5">Academia + industry + clinic</text>
  <line x1="100" y1="906" x2="824" y2="906" stroke="#D3DDE2" stroke-width="2"/>

  <!-- node 1: Adobe (industry) -->
  <text x="120" y="888" class="h ink" font-size="12.5" text-anchor="middle">Adobe Research</text>
  <circle cx="120" cy="906" r="7" fill="#DA8A1F"/>
  <text x="120" y="930" class="b slate" font-size="11" text-anchor="middle">Research Intern · 2018</text>
  <rect x="89" y="940" width="62" height="17" rx="8.5" fill="#DA8A1F"/>
  <text x="120" y="952" class="eyebrow" font-size="8.5" fill="#FFFFFF" text-anchor="middle">Industry</text>

  <!-- node 2: L3S (academia) -->
  <text x="305" y="888" class="h ink" font-size="12.5" text-anchor="middle">L3S · Hannover</text>
  <circle cx="305" cy="906" r="6.5" fill="#FFFFFF" stroke="#0E7C86" stroke-width="2.4"/>
  <text x="305" y="930" class="b slate" font-size="11" text-anchor="middle">Research Associate · 2021–23</text>

  <!-- node 3: Wipro GE (industry) -->
  <text x="470" y="888" class="h ink" font-size="12.5" text-anchor="middle">Wipro GE Healthcare</text>
  <circle cx="470" cy="906" r="7" fill="#DA8A1F"/>
  <text x="470" y="930" class="b slate" font-size="11" text-anchor="middle">AI Intern · 2024–25</text>
  <rect x="439" y="940" width="62" height="17" rx="8.5" fill="#DA8A1F"/>
  <text x="470" y="952" class="eyebrow" font-size="8.5" fill="#FFFFFF" text-anchor="middle">Industry</text>

  <!-- node 4: IIT KGP (academia) -->
  <text x="640" y="888" class="h ink" font-size="12.5" text-anchor="middle">IIT Kharagpur</text>
  <circle cx="640" cy="906" r="6.5" fill="#FFFFFF" stroke="#0E7C86" stroke-width="2.4"/>
  <text x="640" y="930" class="b slate" font-size="11" text-anchor="middle">PhD, CSE · 2025</text>

  <!-- node 5: Stanford (now) -->
  <text x="805" y="888" class="h ink" font-size="12.5" text-anchor="middle">Stanford Medicine</text>
  <circle cx="805" cy="906" r="8" fill="#8C1515"/>
  <circle cx="805" cy="906" r="12" fill="none" stroke="#8C1515" stroke-width="1.4" opacity="0.4"/>
  <text x="805" y="930" class="b slate" font-size="11" text-anchor="middle">Postdoc · 2025–</text>
  <rect x="785" y="940" width="40" height="17" rx="8.5" fill="#8C1515"/>
  <text x="805" y="952" class="eyebrow" font-size="8.5" fill="#FFFFFF" text-anchor="middle">Now</text>

  <!-- footer -->
  <line x1="56" y1="990" x2="864" y2="990" stroke="#DCE5E9" stroke-width="1.5"/>
  <text x="56" y="1014" class="b slate" font-size="11">roysoumya.github.io</text>
  <text x="864" y="1014" class="b slate" font-size="11" text-anchor="end">NLP · ML for healthcare · trustworthy clinical AI</text>
</svg>
