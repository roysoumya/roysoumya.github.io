<svg viewBox="0 0 900 1185" xmlns="http://www.w3.org/2000/svg" font-family="'DejaVu Sans','Segoe UI',system-ui,sans-serif">
  <defs>
    <style>
      .eyebrow { font-weight:700; letter-spacing:2px; }
      .tiny    { letter-spacing:1.5px; font-weight:700; }
    </style>
  </defs>

  <!-- ===== WHITE BACKGROUND ===== -->
  <rect x="0" y="0" width="900" height="1185" fill="#ffffff"/>

  <!-- ===== HEADER ===== -->
  <text x="55" y="58"  class="eyebrow" font-size="17" fill="#1f6f66">Soumyadeep Roy</text>
  <text x="845" y="58" class="eyebrow" font-size="15" fill="#4a5661" text-anchor="end">Postdoc &#183; Stanford Medicine &#183; Computational Medicine</text>

  <text x="53" y="112" font-size="42" font-weight="800" fill="#16283f">Efficient AI models for medicine &amp; biology,</text>
  <text x="53" y="160" font-size="42" font-weight="800" fill="#16283f">rigorously <tspan fill="#c68216">evaluated</tspan></text>

  <text x="55" y="197" font-size="17" fill="#64717e">16+ peer-reviewed papers &#183; ACL &#183; EMNLP &#183; SIGIR &#183; IJCAI &#183; ECAI &#183; CIKM &#183; Frontiers in AI</text>

  <line x1="55" y1="222" x2="845" y2="222" stroke="#d9e0e4" stroke-width="1.5"/>

  <!-- ===== SECTION LABEL ===== -->
  <text x="55" y="256" class="eyebrow" font-size="16" fill="#3c4a56">Research focus &#8212; three converging threads</text>

  <!-- ===== VENN DIAGRAM ===== -->
  <!-- Top circle: Efficient training (teal) -->
  <circle cx="450" cy="392" r="180" fill="#2f8079" fill-opacity="0.16" stroke="#2f8079" stroke-width="2"/>
  <!-- Bottom-left: Evaluation (amber) -->
  <circle cx="350" cy="558" r="180" fill="#d68f24" fill-opacity="0.15" stroke="#d68f24" stroke-width="2"/>
  <!-- Bottom-right: Biomedical NLP (indigo) -->
  <circle cx="550" cy="558" r="180" fill="#5257c4" fill-opacity="0.13" stroke="#5257c4" stroke-width="2"/>

  <!-- Top thread text (inside top circle) -->
  <text x="450" y="300" class="eyebrow" font-size="14" fill="#1f6f66" text-anchor="middle">Pretrain + adapt</text>
  <text x="450" y="337" font-size="27" font-weight="800" fill="#16283f" text-anchor="middle">Efficient model</text>
  <text x="450" y="368" font-size="27" font-weight="800" fill="#16283f" text-anchor="middle">training</text>
  <text x="450" y="396" font-size="15" fill="#5a6773" text-anchor="middle">SLMs &#183; LLMs &#183; DNA transformers</text>

  <!-- Goal circle (center) -->
  <circle cx="450" cy="500" r="70" fill="#0f2338" stroke="#8a1f2c" stroke-width="3"/>
  <text x="450" y="482" class="tiny" font-size="11" fill="#c07f88" text-anchor="middle">THE GOAL</text>
  <text x="450" y="506" font-size="17" font-weight="800" fill="#ffffff" text-anchor="middle">Trustworthy</text>
  <text x="450" y="528" font-size="17" font-weight="800" fill="#ffffff" text-anchor="middle">clinical AI</text>

  <!-- Left thread label (Evaluation) -->
  <circle cx="300" cy="612" r="4" fill="#d68f24"/>
  <line x1="300" y1="612" x2="205" y2="670" stroke="#d68f24" stroke-width="1.5"/>
  <text x="53" y="668" class="eyebrow" font-size="14" fill="#b9781a">Stress-test + audit</text>
  <text x="53" y="704" font-size="27" font-weight="800" fill="#16283f">Reliability</text>
  <text x="53" y="735" font-size="27" font-weight="800" fill="#16283f">evaluation</text>
  <text x="53" y="763" font-size="15" fill="#5a6773">USMLE taxonomy &#183; trajectory safety &#183; uncertainty</text>

  <!-- Right thread label (Biomedical NLP) -->
  <circle cx="600" cy="612" r="4" fill="#5257c4"/>
  <line x1="600" y1="612" x2="695" y2="670" stroke="#5257c4" stroke-width="1.5"/>
  <text x="847" y="668" class="eyebrow" font-size="14" fill="#4247a8" text-anchor="end">Understand clinical text</text>
  <text x="847" y="704" font-size="27" font-weight="800" fill="#16283f" text-anchor="end">Biomedical</text>
  <text x="847" y="735" font-size="27" font-weight="800" fill="#16283f" text-anchor="end">NLP</text>
  <text x="847" y="763" font-size="15" fill="#5a6773" text-anchor="end">summarization &#183; trials &#183; clinical dialogue</text>

  <!-- ===== CALLOUT BOX ===== -->
  <rect x="55" y="800" width="790" height="128" rx="14" fill="#fdf4e3" stroke="#eccf9a" stroke-width="1.5"/>
  <rect x="55" y="800" width="7" height="128" rx="3.5" fill="#d68f24"/>
  <text x="88" y="838" class="eyebrow" font-size="17" fill="#b9781a">From DNA to the bedside</text>
  <text x="88" y="868" font-size="17" fill="#3c4a56">Efficient foundation models, then evaluated for safety on real-world clinical data.</text>

  <!-- chips -->
  <g font-size="14" fill="#3c4a56">
    <rect x="88"  y="886" width="150" height="30" rx="15" fill="#ffffff" stroke="#e2d3ac"/>
    <text x="163" y="906" text-anchor="middle">DNABert / LOGO</text>
    <rect x="250" y="886" width="150" height="30" rx="15" fill="#ffffff" stroke="#e2d3ac"/>
    <text x="325" y="906" text-anchor="middle">small + large LMs</text>
    <rect x="412" y="886" width="128" height="30" rx="15" fill="#ffffff" stroke="#e2d3ac"/>
    <text x="476" y="906" text-anchor="middle">MIMIC-III/IV</text>
    <rect x="552" y="886" width="196" height="30" rx="15" fill="#ffffff" stroke="#e2d3ac"/>
    <text x="650" y="906" text-anchor="middle">10&#215; pretraining speedup</text>
  </g>

  <!-- ===== TIMELINE ===== -->
  <text x="55" y="978" class="eyebrow" font-size="16" fill="#3c4a56">Academia + industry + clinic</text>

  <line x1="110" y1="1055" x2="800" y2="1055" stroke="#d9e0e4" stroke-width="2.5"/>

  <!-- Adobe -->
  <text x="110" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">Adobe Research</text>
  <circle cx="110" cy="1055" r="8" fill="#d68f24"/>
  <text x="110" y="1084" font-size="12" fill="#64717e" text-anchor="middle">Research Intern &#183; 2018</text>
  <rect x="72" y="1098" width="76" height="24" rx="12" fill="#d68f24"/>
  <text x="110" y="1115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Industry</text>

  <!-- IIT KGP (MS) -->
  <text x="248" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">IIT Kharagpur</text>
  <circle cx="248" cy="1055" r="8" fill="#ffffff" stroke="#2f8079" stroke-width="2.5"/>
  <text x="248" y="1084" font-size="12" fill="#64717e" text-anchor="middle">MS (Research) &#183; 2019</text>

  <!-- L3S -->
  <text x="386" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">L3S &#183; Hannover</text>
  <circle cx="386" cy="1055" r="8" fill="#ffffff" stroke="#2f8079" stroke-width="2.5"/>
  <text x="386" y="1084" font-size="12" fill="#64717e" text-anchor="middle">Researcher &#183; 2021&#8211;23</text>

  <!-- Wipro GE -->
  <text x="524" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">Wipro GE Healthcare</text>
  <circle cx="524" cy="1055" r="8" fill="#d68f24"/>
  <text x="524" y="1084" font-size="12" fill="#64717e" text-anchor="middle">AI Intern &#183; 2024&#8211;25</text>
  <rect x="486" y="1098" width="76" height="24" rx="12" fill="#d68f24"/>
  <text x="524" y="1115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Industry</text>

  <!-- IIT KGP (PhD) -->
  <text x="662" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">IIT Kharagpur</text>
  <circle cx="662" cy="1055" r="8" fill="#ffffff" stroke="#2f8079" stroke-width="2.5"/>
  <text x="662" y="1084" font-size="12" fill="#64717e" text-anchor="middle">PhD, CSE &#183; 2025</text>

  <!-- Stanford -->
  <text x="800" y="1028" font-size="13" font-weight="700" fill="#16283f" text-anchor="middle">Stanford Medicine</text>
  <circle cx="800" cy="1055" r="9" fill="#8a1f2c" stroke="#f2c9cf" stroke-width="3"/>
  <text x="800" y="1084" font-size="12" fill="#64717e" text-anchor="middle">Postdoc &#183; 2025&#8211;</text>
  <rect x="775" y="1098" width="50" height="24" rx="12" fill="#8a1f2c"/>
  <text x="800" y="1115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Now</text>

  <!-- ===== FOOTER ===== -->
  <line x1="55" y1="1148" x2="845" y2="1148" stroke="#d9e0e4" stroke-width="1.5"/>
  <text x="55" y="1174" font-size="14" fill="#64717e">roysoumya.github.io</text>
  <text x="845" y="1174" font-size="14" fill="#64717e" text-anchor="end">efficient training &#183; evaluation &#183; biomedical NLP</text>
</svg>
